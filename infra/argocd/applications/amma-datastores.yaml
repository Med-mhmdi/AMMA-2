apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amma-datastores
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: amma-platform
  source:
    repoURL: https://github.com/Med-mhmdi/AMMA-2.git
    targetRevision: main
    path: infra/k8s
    directory:
      recurse: true
      include: '{deployments/postgres.yaml,services/postgres-service.yaml,deployments/mongodb.yaml,services/mongodb-service.yaml,deployments/redis.yaml,services/redis-service.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: amma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
