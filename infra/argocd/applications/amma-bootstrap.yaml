apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amma-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: amma-platform
  source:
    repoURL: https://github.com/Med-mhmdi/AMMA-2.git
    targetRevision: main
    path: infra/k8s
    directory:
      recurse: true
      include: '{namespace/*.yaml,configmaps/*.yaml,secrets/*.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: amma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
