apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amma-root
  namespace: argocd
spec:
  project: amma-platform
  source:
    repoURL: https://github.com/amimoh29400/AMMA-2.git
    targetRevision: main
    path: infra/argocd/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

