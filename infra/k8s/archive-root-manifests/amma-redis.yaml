apiVersion: apps/v1
kind: Deployment
metadata:
  name: amma-redis
  namespace: amma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amma-redis
  template:
    metadata:
      labels:
        app: amma-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          args:
            - redis-server
            - --appendonly
            - "yes"
---
apiVersion: v1
kind: Service
metadata:
  name: amma-redis
  namespace: amma
spec:
  selector:
    app: amma-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
