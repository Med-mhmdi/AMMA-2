apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: amma-mongodb-pvc
  namespace: amma
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amma-mongodb
  namespace: amma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amma-mongodb
  template:
    metadata:
      labels:
        app: amma-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: amma-mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: amma-mongodb
  namespace: amma
spec:
  selector:
    app: amma-mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
  type: ClusterIP
