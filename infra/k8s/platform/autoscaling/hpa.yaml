apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: amma-gateway-hpa
  namespace: amma
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: amma-gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
