apiVersion: apps/v1
kind: Deployment
metadata:
  name: amma-postgres
  namespace: amma
  labels:
    app: amma-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amma-postgres
  template:
    metadata:
      labels:
        app: amma-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: amma_db
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 20
