apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: amma-gateway
  namespace: amma
spec:
  hosts:
    - "*"
  gateways:
    - amma-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: amma-gateway
            port:
              number: 8000
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: gateway-error,connect-failure,refused-stream,5xx
      timeout: 15s
