replicaCount: 1
image:
  repository: localhost:5000/amma-gateway
  tag: local
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8000
containerPort: 8000
envFrom:
  configMap: amma-app-config
  secret: amma-app-secrets
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
serviceAccountName: amma-microservice-sa
podLabels:
  app.kubernetes.io/part-of: amma
