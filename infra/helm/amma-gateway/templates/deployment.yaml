apiVersion: apps/v1
kind: Deployment
metadata:
  name: amma-gateway
  labels:
    app: amma-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: amma-gateway
  template:
    metadata:
      labels:
        app: amma-gateway
        app.kubernetes.io/name: amma-gateway
        app.kubernetes.io/part-of: amma
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      containers:
        - name: amma-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ .Values.envFrom.configMap }}
            - secretRef:
                name: {{ .Values.envFrom.secret }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
