global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: amma_gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8000"]

  - job_name: amma_auth_service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth_service:8000"]

  - job_name: amma_expense_service
    metrics_path: /metrics
    static_configs:
      - targets: ["expense_service:8000"]

  - job_name: amma_loan_service
    metrics_path: /metrics
    static_configs:
      - targets: ["loan_service:8000"]

  - job_name: amma_analytics_service
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics_service:8000"]

  - job_name: amma_notification_service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification_service:8000"]

  - job_name: amma_agent_service
    metrics_path: /metrics
    static_configs:
      - targets: ["multi_agent_system:8000"]
