services:
  auth_db:
    image: postgres:16
    container_name: amma_auth_db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - amma_net

  expense_db:
    image: postgres:16
    container_name: amma_expense_db
    environment:
      POSTGRES_DB: ${EXPENSE_DB_NAME}
      POSTGRES_USER: ${EXPENSE_DB_USER}
      POSTGRES_PASSWORD: ${EXPENSE_DB_PASSWORD}
    volumes:
      - expense_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - amma_net

  loan_db:
    image: postgres:16
    container_name: amma_loan_db
    environment:
      POSTGRES_DB: ${LOAN_DB_NAME}
      POSTGRES_USER: ${LOAN_DB_USER}
      POSTGRES_PASSWORD: ${LOAN_DB_PASSWORD}
    volumes:
      - loan_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - amma_net

  notification_db:
    image: postgres:16
    container_name: amma_notification_db
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - amma_net

  mongodb:
    image: mongo:7
    container_name: amma_mongodb
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - amma_net

  redis:
    image: redis:7
    container_name: amma_redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - amma_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: amma_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    networks:
      - amma_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: amma_kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - amma_net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: amma_kafka_init
    depends_on:
      - kafka
    volumes:
      - ./infra/kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["bash", "/init-topics.sh"]
    networks:
      - amma_net
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: amma_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - amma_net

  auth_service:
    build:
      context: .
      dockerfile: ./infra/docker/auth_service.Dockerfile
    container_name: amma_auth_service
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_ENABLED: "true"
    depends_on:
      - auth_db
    networks:
      - amma_net

  expense_service:
    build:
      context: .
      dockerfile: ./infra/docker/expense_service.Dockerfile
    container_name: amma_expense_service
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_ENABLED: "true"
    depends_on:
      - expense_db
      - kafka
      - kafka-init
    networks:
      - amma_net

  loan_service:
    build:
      context: .
      dockerfile: ./infra/docker/loan_service.Dockerfile
    container_name: amma_loan_service
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_ENABLED: "true"
    depends_on:
      - loan_db
      - kafka
      - kafka-init
    networks:
      - amma_net

  analytics_service:
    build:
      context: .
      dockerfile: ./infra/docker/analytics_service.Dockerfile
    container_name: amma_analytics_service
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_ENABLED: "true"
    depends_on:
      - redis
      - kafka
      - expense_service
      - loan_service
    networks:
      - amma_net

  notification_service:
    build:
      context: .
      dockerfile: ./infra/docker/notification_service.Dockerfile
    container_name: amma_notification_service
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_ENABLED: "true"
    depends_on:
      - notification_db
      - kafka
      - kafka-init
    networks:
      - amma_net

  ollama:
    image: ollama/ollama:latest
    container_name: amma_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - amma_net

  multi_agent_system:
    build:
      context: .
      dockerfile: ./infra/docker/multi_agent_system.Dockerfile
    container_name: amma_multi_agent_system
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_ENABLED: "true"
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST}
      LANGFUSE_ENVIRONMENT: ${LANGFUSE_ENVIRONMENT}
      LANGFUSE_RELEASE: ${LANGFUSE_RELEASE}
      LANGFUSE_CAPTURE_INPUT_OUTPUT: ${LANGFUSE_CAPTURE_INPUT_OUTPUT}
      LANGFUSE_MAX_PAYLOAD_CHARS: ${LANGFUSE_MAX_PAYLOAD_CHARS}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT}
    depends_on:
      - mongodb
      - redis
      - ollama
      - expense_service
      - loan_service
      - analytics_service
      - notification_service
    ports:
      - "8005:8000"
    networks:
      - amma_net

  gateway:
    build:
      context: .
      dockerfile: ./infra/docker/gateway.Dockerfile
    container_name: amma_gateway
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_ENABLED: "true"
    depends_on:
      - auth_service
      - expense_service
      - loan_service
      - analytics_service
      - notification_service
      - multi_agent_system
    ports:
      - "8000:8000"
    networks:
      - amma_net

  frontend:
    build:
      context: .
      dockerfile: ./infra/docker/frontend.Dockerfile
    container_name: amma_frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    networks:
      - amma_net

  nginx:
    image: nginx:1.27-alpine
    container_name: amma_nginx
    depends_on:
      - frontend
      - gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - amma_net

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: amma_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - amma_net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: amma_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - amma_net

  loki:
    image: grafana/loki:3.2.1
    container_name: amma_loki
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - amma_net


  promtail:
    image: grafana/promtail:3.2.1
    container_name: amma_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - amma_net

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: amma_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - amma_net

networks:
  amma_net:
    driver: bridge

volumes:
  auth_db_data:
  expense_db_data:
  loan_db_data:
  notification_db_data:
  mongodb_data:
  redis_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  loki_data:
