apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: direct-kubernetes-pod-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods-direct
              source: pod-files
              __path__: /var/log/pods/*/*/*.log

        pipeline_stages:
          - cri: {}
