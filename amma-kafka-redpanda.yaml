apiVersion: v1
kind: Namespace
metadata:
  name: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amma-kafka
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amma-kafka
  template:
    metadata:
      labels:
        app: amma-kafka
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - 512M
            - --reserve-memory
            - 0M
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr
            - PLAINTEXT://amma-kafka-bootstrap.kafka.svc.cluster.local:9092
          ports:
            - name: kafka
              containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: amma-kafka-bootstrap
  namespace: kafka
spec:
  selector:
    app: amma-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  type: ClusterIP
